<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QuickBite | Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-brand" href="#">QUICKBITE</a>
        <div class="ms-auto">
            <span id="welcomeUser" class="text-white me-3"></span>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
        </div>
    </div>
</nav>

<section id="menu" class="container py-5">
    <h2 class="mb-4">Our Menu</h2>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body text-center">
                    <h5>Cheeseburger</h5>
                    <p class="text-muted">₹249</p>
                    <button class="btn btn-danger addToCart">Add to Cart</button>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body text-center">
                    <h5>Pizza</h5>
                    <p class="text-muted">₹499</p>
                    <button class="btn btn-danger addToCart">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
</section>

<section id="orders" class="container py-5 border-top">
    <h2 class="mb-4">Your Orders</h2>
    <ul id="orderList" class="list-group">
        </ul>
</section>

<script src="app.js"></script>
</body>
</html>
