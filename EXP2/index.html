<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QuickBite | Welcome</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold text-brand" href="index.html">QUICKBITE</a>
    </div>
</nav>

<header class="hero-section text-center">
    <div class="container">
        <h1 class="display-4 fw-bold">Hungry? We got you.</h1>
        <p class="lead">Join us to start ordering.</p>
    </div>
</header>

<div class="container py-5">
    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card p-4">
                <h2 class="text-center mb-4">Sign Up</h2>
                <form id="signupForm">
                    <div class="mb-3"><input type="text" id="signupName" class="form-control" placeholder="Full Name" required></div>
                    <div class="mb-3"><input type="email" id="signupEmail" class="form-control" placeholder="Email" required></div>
                    <div class="mb-3"><input type="password" id="signupPassword" class="form-control" placeholder="Password" required></div>
                    <button type="submit" class="btn btn-danger w-100">Create Account</button>
                </form>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4">
                <h2 class="text-center mb-4">Login</h2>
                <form id="loginForm">
                    <div class="mb-3"><input type="email" id="loginEmail" class="form-control" placeholder="Email" required></div>
                    <div class="mb-3"><input type="password" id="loginPassword" class="form-control" placeholder="Password" required></div>
                    <button type="submit" class="btn btn-success w-100">Login</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="auth.js"></script>
</body>
</html>
