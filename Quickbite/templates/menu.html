<!DOCTYPE html>
<html>

<head>

<title>QuickBite Menu</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="/static/style.css">

<script src="/static/script.js"></script>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand fw-bold">QuickBite</a>

<div>

<a href="/menu" class="btn btn-light me-2">Menu</a>

<a href="/cart" class="btn btn-warning">Cart</a>

</div>

</div>

</nav>


<div class="container mt-5">

<h2 class="text-center mb-4">Food Menu</h2>

<div class="row">

{% for food in foods %}

<div class="col-md-3 d-flex">

<div class="card food-card w-100">

<img src="{{ food.image }}" class="card-img-top food-img">

<div class="card-body text-center">

<h5 class="card-title">{{ food.name }}</h5>

<p class="price">₹{{ food.price }}</p>

<button class="btn btn-warning"
onclick="addToCart('{{ food.name }}', {{ food.price }})">

Order Now

</button>

</div>

</div>

</div>

{% endfor %}

</div>

</div>


<footer class="footer">

<p>© 2026 QuickBite</p>

</footer>

</body>

</html>
