<!DOCTYPE html>
<html>

<head>

<title>Your Cart</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand fw-bold">QuickBite</a>

<a href="/menu" class="btn btn-light">Back to Menu</a>

</div>

</nav>


<div class="container mt-5">

<h2>Your Cart</h2>

<table class="table">

<thead>

<tr>

<th>Item</th>
<th>Price</th>

</tr>

</thead>

<tbody id="cartItems"></tbody>

</table>

<h4 id="totalAmount"></h4>

<button class="btn btn-success mt-3" onclick="placeOrder()">
Order Now
</button>

</div>


<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

let table = document.getElementById("cartItems")

let total = 0


if(cart.length === 0){

table.innerHTML = "<tr><td colspan='2'>Cart is empty</td></tr>"

}

cart.forEach(item => {

let row = document.createElement("tr")

row.innerHTML = `
<td>${item.name}</td>
<td>₹${item.price}</td>
`

table.appendChild(row)

total += item.price

})


document.getElementById("totalAmount").innerText =
"Total Amount: ₹" + total


function placeOrder(){

alert("Order placed successfully!")

localStorage.removeItem("cart")

location.reload()

}

</script>

</body>

</html>
